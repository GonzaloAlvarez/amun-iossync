---
# Per-library build recipe — invoked from build.yml with loop_var: lib.
# Idempotence: stat binary AND pkg-config check (when applicable).
# Skip block unless either fails OR iossync_force_rebuild is true.

- name: "[{{ lib.name }}] Stat installed artifact"
  ansible.builtin.stat:
    path: "{{ lib.binary_check }}"
  register: lib_binary_stat

- name: "[{{ lib.name }}] Check pkg-config registration"
  ansible.builtin.command: "pkg-config --modversion {{ lib.pkgconfig }}"
  register: lib_pkgconfig_check
  changed_when: false
  failed_when: false
  when: lib.pkgconfig | length > 0
  environment:
    PKG_CONFIG_PATH: /usr/local/lib/pkgconfig

- name: "[{{ lib.name }}] Decide whether to build"
  ansible.builtin.set_fact:
    lib_needs_build: >-
      {{
        iossync_force_rebuild | bool
        or not lib_binary_stat.stat.exists
        or (lib.pkgconfig | length > 0 and lib_pkgconfig_check.rc != 0)
      }}

- name: "[{{ lib.name }}] Build + install from source"
  when: lib_needs_build | bool
  become: true
  block:
    - name: "[{{ lib.name }}] Clone or update source"
      ansible.builtin.git:
        repo: "{{ lib.repo }}"
        dest: "{{ iossync_build_dir }}/{{ lib.name }}"
        version: master
        force: true

    - name: "[{{ lib.name }}] Run autogen.sh"
      ansible.builtin.command:
        cmd: ./autogen.sh
        chdir: "{{ iossync_build_dir }}/{{ lib.name }}"
      environment:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        LD_LIBRARY_PATH: /usr/local/lib
      changed_when: true

    - name: "[{{ lib.name }}] make"
      community.general.make:
        chdir: "{{ iossync_build_dir }}/{{ lib.name }}"
      environment:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        LD_LIBRARY_PATH: /usr/local/lib

    - name: "[{{ lib.name }}] make install"
      community.general.make:
        chdir: "{{ iossync_build_dir }}/{{ lib.name }}"
        target: install
      environment:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        LD_LIBRARY_PATH: /usr/local/lib
      notify: Run ldconfig

    - name: "[{{ lib.name }}] ldconfig immediately so next library's pkg-config sees the .so"
      ansible.builtin.command: ldconfig
      changed_when: false

- name: "[{{ lib.name }}] Verify expected artifact present after build"
  ansible.builtin.stat:
    path: "{{ lib.binary_check }}"
  register: lib_binary_post

- name: "[{{ lib.name }}] Fail if build did not produce expected artifact"
  ansible.builtin.fail:
    msg: "{{ lib.name }} install completed but {{ lib.binary_check }} not found"
  when: not lib_binary_post.stat.exists
