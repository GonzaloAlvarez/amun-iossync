---
- name: Install iossync-common.sh shared library
  ansible.builtin.copy:
    src: iossync-common.sh
    dest: /usr/local/lib/iossync-common.sh
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Install iossync scripts to /usr/local/bin
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: root
    group: root
    mode: "0755"
  loop:
    - ios-backup
    - ios-sync-photos
    - ios-sync
  become: true
