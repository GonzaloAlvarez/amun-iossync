---
# Upstream usbmuxd `make install` no longer creates the `usbmux` user or
# the udev rule/systemd unit (the latter two are gated on configure flags;
# see iossync_libraries.usbmuxd.configure_args in defaults/main.yml).
# Create the user here explicitly — matches Debian's stock usbmuxd packaging.
- name: Ensure usbmux system user exists
  ansible.builtin.user:
    name: usbmux
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/usbmux
    create_home: false
    groups: plugdev
    append: false
  become: true
  when: not iossync_skip_build | bool

- name: Ensure fuse group exists (Debian 13 dropped auto-creation by fuse3)
  ansible.builtin.group:
    name: fuse
    state: present
    system: true
  become: true

- name: Ensure target user is in fuse group
  ansible.builtin.user:
    name: "{{ iossync_user }}"
    groups: fuse
    append: true
  become: true

- name: Ensure target user is in plugdev group
  ansible.builtin.user:
    name: "{{ iossync_user }}"
    groups: plugdev
    append: true
  become: true

- name: Reload udev rules so 39-usbmuxd.rules is picked up
  ansible.builtin.command:
    cmd: "{{ item }}"
  loop:
    - udevadm control --reload-rules
    - udevadm trigger
  become: true
  changed_when: false
  when: not iossync_skip_build | bool

- name: Enable and start usbmuxd
  ansible.builtin.systemd:
    name: usbmuxd
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: not iossync_skip_build | bool
